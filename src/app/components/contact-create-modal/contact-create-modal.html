<div class="contact_create_modal">
  <div class="inner">
    <div class="left">
      <div class="cc_close_btn_wrapper">
        <button class="cc_close_btn" (click)="closeModal()">
          <svg
            width="14"
            height="14"
            viewBox="0 0 14 14"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M6.575 7.975L1.675 12.875C1.49167 13.0583 1.25833 13.15 0.975 13.15C0.691667 13.15 0.458333 13.0583 0.275 12.875C0.0916667 12.6917 0 12.4583 0 12.175C0 11.8917 0.0916667 11.6583 0.275 11.475L5.175 6.575L0.275 1.675C0.0916667 1.49167 0 1.25833 0 0.975C0 0.691667 0.0916667 0.458333 0.275 0.275C0.458333 0.0916667 0.691667 0 0.975 0C1.25833 0 1.49167 0.0916667 1.675 0.275L6.575 5.175L11.475 0.275C11.6583 0.0916667 11.8917 0 12.175 0C12.4583 0 12.6917 0.0916667 12.875 0.275C13.0583 0.458333 13.15 0.691667 13.15 0.975C13.15 1.25833 13.0583 1.49167 12.875 1.675L7.975 6.575L12.875 11.475C13.0583 11.6583 13.15 11.8917 13.15 12.175C13.15 12.4583 13.0583 12.6917 12.875 12.875C12.6917 13.0583 12.4583 13.15 12.175 13.15C11.8917 13.15 11.6583 13.0583 11.475 12.875L6.575 7.975Z"
              fill="white"
            />
          </svg>
        </button>
      </div>

      <img src="assets/icons/logo/logo.png" alt="logo" class="cc_logo" />
      <h2>Add Contact</h2>
      <h3>Tasks are better with team!</h3>
      <div class="cc_blue_line"></div>
    </div>

    <div class="right">
      <div class="cc_close_btn_wrapper">
        <button class="cc_close_btn" (click)="closeModal()">
          <svg
            width="14"
            height="14"
            viewBox="0 0 14 14"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M6.575 7.975L1.675 12.875C1.49167 13.0583 1.25833 13.15 0.975 13.15C0.691667 13.15 0.458333 13.0583 0.275 12.875C0.0916667 12.6917 0 12.4583 0 12.175C0 11.8917 0.0916667 11.6583 0.275 11.475L5.175 6.575L0.275 1.675C0.0916667 1.49167 0 1.25833 0 0.975C0 0.691667 0.0916667 0.458333 0.275 0.275C0.458333 0.0916667 0.691667 0 0.975 0C1.25833 0 1.49167 0.0916667 1.675 0.275L6.575 5.175L11.475 0.275C11.6583 0.0916667 11.8917 0 12.175 0C12.4583 0 12.6917 0.0916667 12.875 0.275C13.0583 0.458333 13.15 0.691667 13.15 0.975C13.15 1.25833 13.0583 1.49167 12.875 1.675L7.975 6.575L12.875 11.475C13.0583 11.6583 13.15 11.8917 13.15 12.175C13.15 12.4583 13.0583 12.6917 12.875 12.875C12.6917 13.0583 12.4583 13.15 12.175 13.15C11.8917 13.15 11.6583 13.0583 11.475 12.875L6.575 7.975Z"
              fill="#2A3647"
            />
          </svg>
        </button>
      </div>

      <div class="inner">
        <div class="cc_avatar" style="background-color: rgb(202, 202, 202)">
          <svg
            width="43"
            height="43"
            viewBox="0 0 43 43"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M21.3333 21.3333C18.4 21.3333 15.8889 20.2889 13.8 18.2C11.7111 16.1111 10.6667 13.6 10.6667 10.6667C10.6667 7.73333 11.7111 5.22222 13.8 3.13333C15.8889 1.04444 18.4 0 21.3333 0C24.2667 0 26.7778 1.04444 28.8667 3.13333C30.9556 5.22222 32 7.73333 32 10.6667C32 13.6 30.9556 16.1111 28.8667 18.2C26.7778 20.2889 24.2667 21.3333 21.3333 21.3333ZM37.3333 42.6667H5.33333C3.86667 42.6667 2.61111 42.1444 1.56667 41.1C0.522222 40.0556 0 38.8 0 37.3333V35.2C0 33.6889 0.388889 32.3 1.16667 31.0333C1.94444 29.7667 2.97778 28.8 4.26667 28.1333C7.02222 26.7556 9.82222 25.7222 12.6667 25.0333C15.5111 24.3444 18.4 24 21.3333 24C24.2667 24 27.1556 24.3444 30 25.0333C32.8444 25.7222 35.6444 26.7556 38.4 28.1333C39.6889 28.8 40.7222 29.7667 41.5 31.0333C42.2778 32.3 42.6667 33.6889 42.6667 35.2V37.3333C42.6667 38.8 42.1444 40.0556 41.1 41.1C40.0556 42.1444 38.8 42.6667 37.3333 42.6667ZM5.33333 37.3333H37.3333V35.2C37.3333 34.7111 37.2111 34.2667 36.9667 33.8667C36.7222 33.4667 36.4 33.1556 36 32.9333C33.6 31.7333 31.1778 30.8333 28.7333 30.2333C26.2889 29.6333 23.8222 29.3333 21.3333 29.3333C18.8444 29.3333 16.3778 29.6333 13.9333 30.2333C11.4889 30.8333 9.06667 31.7333 6.66667 32.9333C6.26667 33.1556 5.94444 33.4667 5.7 33.8667C5.45556 34.2667 5.33333 34.7111 5.33333 35.2V37.3333ZM21.3333 16C22.8 16 24.0556 15.4778 25.1 14.4333C26.1444 13.3889 26.6667 12.1333 26.6667 10.6667C26.6667 9.2 26.1444 7.94445 25.1 6.9C24.0556 5.85556 22.8 5.33333 21.3333 5.33333C19.8667 5.33333 18.6111 5.85556 17.5667 6.9C16.5222 7.94445 16 9.2 16 10.6667C16 12.1333 16.5222 13.3889 17.5667 14.4333C18.6111 15.4778 19.8667 16 21.3333 16Z"
              fill="white"
            />
          </svg>
        </div>

        <form class="cc_form" [formGroup]="contactForm" (ngSubmit)="createContact()">
          <label for="cc_name">
            <input
              class="cc_input"
              type="text"
              name="name"
              id="cc_name"
              placeholder="Name"
              formControlName="name"
              [style.border]="!name?.valid && name?.touched ? '2px solid #ff3d00' : ''"
            />

            @if (!name?.valid && name?.touched) {
              @if (name?.hasError('required')) {
                <span>name is required</span>
              }

              @if (name?.hasError('pattern')) {
                <span>firstname and lastname ist required</span>
              }
            }
          </label>
          <label for="cc_email">
            <input
              class="cc_input"
              type="email"
              name="email"
              id="cc_email"
              placeholder="Email"
              formControlName="email"
              [style.border]="!email?.valid && email?.touched ? '2px solid #ff3d00' : ''"
            />

            @if (!email?.valid && email?.touched) {
              @if (email?.hasError('required')) {
                <span>email is required</span>
              }

              @if (email?.hasError('pattern')) {
                <span>email ist not correct</span>
              }
            }
          </label>
          <label for="cc_phone">
            <input
              class="cc_input"
              type="text"
              name="phone"
              id="cc_phone"
              placeholder="Phone"
              formControlName="phone"
              [style.border]="!phone?.valid && phone?.touched ? '2px solid #ff3d00' : ''"
            />

            @if (!phone?.valid && phone?.touched) {
              @if (phone?.hasError('required')) {
                <span>Phone is required</span>
              }

              @if (phone?.hasError('pattern')) {
                <span>Phone number ist not correct</span>
              }
            }
          </label>

          <span class="cc_warning"> {{ errorMessage() }}</span>

          <div class="cc_button_wrapper">
            <button (click)="closeModal()" type="button" class="secondary-button">
              <span class="secondary-button__label">Cancel</span>
              <span class="secondary-button__icon" aria-hidden="true">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M12.0008 12.0001L17.2438 17.2431M6.75781 17.2431L12.0008 12.0001L6.75781 17.2431ZM17.2438 6.75708L11.9998 12.0001L17.2438 6.75708ZM11.9998 12.0001L6.75781 6.75708L11.9998 12.0001Z"
                    stroke="#2A3647"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
            </button>

            <button
              type="button"
              class="primary-button"
              (click)="createContact()"
              [disabled]="saving()"
            >
              <span class="primary-button__label">{{
                saving() ? 'Saving...' : 'Create contact'
              }}</span>
              <span class="primary-button__icon" aria-hidden="true">
                <svg
                  width="16"
                  height="12"
                  viewBox="0 0 16 12"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M5.288 8.775L13.763 0.3C13.963 0.1 14.2005 0 14.4755 0C14.7505 0 14.988 0.1 15.188 0.3C15.388 0.5 15.488 0.7375 15.488 1.0125C15.488 1.2875 15.388 1.525 15.188 1.725L5.988 10.925C5.788 11.125 5.55467 11.225 5.288 11.225C5.02133 11.225 4.788 11.125 4.588 10.925L0.288 6.625C0.088 6.425 -0.00783333 6.1875 0.0005 5.9125C0.00883333 5.6375 0.113 5.4 0.313 5.2C0.513 5 0.7505 4.9 1.0255 4.9C1.3005 4.9 1.538 5 1.738 5.2L5.288 8.775Z"
                    fill="white"
                  />
                </svg>
              </span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
